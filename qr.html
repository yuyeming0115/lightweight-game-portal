<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>手机访问二维码</title>
<style>
body{font-family:system-ui,sans-serif;background:#f4f7f2;display:grid;place-items:center;min-height:100vh;margin:0;color:#18202a}
.card{background:#fff;padding:32px 40px;border-radius:12px;box-shadow:0 18px 45px rgba(24,32,42,.1);text-align:center}
h1{font-size:18px;margin:0 0 8px}
p{color:#627083;margin:6px 0;font-size:14px}
.url{background:#edf5ef;padding:10px 14px;border-radius:6px;font-family:monospace;font-size:14px;color:#2f6f5f;display:inline-block;margin:14px 0 18px}
#qrcode{margin:0 auto}
</style>
</head>
<body>
<div class="card">
<h1>手机扫码测试</h1>
<p>用手机 Tailscale 组网后，扫描下面二维码即可访问</p>
<div class="url" id="url">http://100.89.145.6/</div>
<div id="qrcode"></div>
<p style="margin-top:18px">或手动访问：手机浏览器输入上方的地址</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
var url='http://100.89.145.6/';
new QRCode(document.getElementById('qrcode'),{text:url,width:200,height:200});
</script>
</body>
</html>
